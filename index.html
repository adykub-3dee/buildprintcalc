<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud Edition</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        
        /* Nová štruktúra hlavičky */
        .header { 
            width: 100%; max-width: 1200px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; 
        }
        
        .header-left { display: flex; flex-direction: column; gap: 5px; }
        
        .header-center { text-align: center; }
        #live-clock { font-size: 1.4em; font-weight: 800; color: #fff; letter-spacing: 1px; }
        #live-date { font-size: 0.8em; color: var(--primary); text-transform: uppercase; font-weight: bold; }

        .header-right { text-align: right; background: rgba(255, 62, 62, 0.1); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--danger); }
        .header-right label { margin: 0; color: var(--danger); font-size: 0.6em; }
        .header-right .val { font-size: 1.1em; font-weight: 900; color: #fff; }

        .config-bar { background: #001a33; padding: 5px 10px; border-radius: 8px; display: flex; gap: 10px; border: 1px solid var(--primary); margin-top: 5px; width: fit-content; }
        .config-input { background: #000; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 2px; width: 50px; font-size: 0.8em; }
        
        @media (max-width: 768px) {
            .header { grid-template-columns: 1fr; text-align: center; }
            .header-right { text-align: center; order: -1; }
            .header-center { order: -2; }
            .header-left { align-items: center; }
            .config-bar { justify-content: center; }
        }

        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 850px) { .main-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; } }

        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .sticky { position: sticky; top: 15px; }

        label { display: block; font-size: 0.65em; color: #aaa; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .calc-preview { background: #1a1500; padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); font-size: 0.9em; }
        .line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; }
        .input-inline { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 4px 8px; border-radius: 4px; width: 85px; text-align: right; font-weight: bold; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-buy { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 8px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 900px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .stat-card { background: #111; padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 1.15em; font-weight: 900; }
        .card-profit { border: 2px solid var(--success); background: #001a0d; color: var(--success); }

        .job-card { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; justify-content: space-between; }
        .job-card.type-buy { border-left: 5px solid var(--danger); }
        .job-card.type-print { border-left: 5px solid var(--primary); }
        
        .actions { display: flex; gap: 5px; }
        .action-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 6px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1 style="margin:0; font-size:1.2em; color:var(--primary);">3Dee <span style="color:#fff">PRO</span></h1>
        <div class="config-bar">
            <div><label>€/KG</label><input type="number" id="cfg_fil" value="19" class="config-input"></div>
            <div><label>€/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input"></div>
        </div>
    </div>
    
    <div class="header-center">
        <div id="live-clock">00:00:00</div>
        <div id="live-date">PONDELOK, 01. JANUÁR</div>
    </div>

    <div class="header-right">
        <label>NÁKLADY (MAT+ELE)</label>
        <div class="val" id="top_total_costs">0.00 €</div>
    </div>
</div>

<div class="main-layout">
    <div class="side-panels">
        <div class="panel sticky">
            <h2 id="form_title" style="color:var(--primary); font-size: 1.1em; margin-top:0;">✚ NOVÁ TLAČ</h2>
            <label>Názov Projektu</label>
            <input type="text" id="in_name" placeholder="Názov...">
            <div class="row">
                <div><label>Váha/ks (g)</label><input type="number" id="in_w" step="any"></div>
                <div><label>Počet ks</label><input type="number" id="in_count" value="1"></div>
            </div>
            <div class="row">
                <div><label>Hodiny</label><input type="number" id="in_h" step="1"></div>
                <div><label>Minúty</label><input type="number" id="in_m" step="1"></div>
            </div>
            <label>Predajná cena / 1 ks (€)</label>
            <input type="number" id="in_price_per" step="any">
            
            <div class="calc-preview">
                <div class="line"><span>MATERIÁL:</span> <span id="view_total_w">0 g</span></div>
                <div class="line">
                    <span>NÁKLAD SPOLU (€):</span> 
                    <input type="number" id="view_total_cost" class="input-inline" step="any" oninput="manualCostUpdate()">
                </div>
                <div class="line" style="font-size: 1.1em; margin-top: 5px; border-top: 1px solid #444; padding-top: 5px;">
                    <span>ČISTÝ ZISK:</span> <span id="view_total_profit">0.00 €</span>
                </div>
            </div>
            
            <button class="btn-add" id="btn_save" onclick="saveItem()">ULOŽIŤ DO HISTÓRIE</button>
            <button id="btn_cancel" onclick="cancelEdit()" style="display:none; background:none; border:none; color:#777; width:100%; margin-top:10px; cursor:pointer;">Zrušiť úpravu</button>
            <button class="btn-buy" onclick="addOtherItem()">✚ PRIDAŤ INÚ POLOŽKU</button>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="handleCloud('backup')" style="flex:1; background:#0a1f33; color:var(--primary); border:1px solid var(--primary); padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">ZÁLOHOVAŤ</button>
                <button onclick="handleCloud('restore')" style="flex:1; background:#0a1f33; color:var(--primary); border:1px solid var(--primary); padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">OBNOVIŤ</button>
            </div>
        </div>
    </div>

    <div>
        <div class="summary-grid">
            <div class="stat-card"><label style="font-size:0.6em;">VYLAČENÉ</label><div class="stat-value" id="total_kg_ever">0.00 kg</div></div>
            <div class="stat-card"><label style="font-size:0.6em;">ČAS TLAČE</label><div class="stat-value" id="total_time_ever">0h 0m</div></div>
            <div class="stat-card"><label style="font-size:0.6em;">INVESTÍCIE / INÉ</label><div class="stat-value" id="total_spent_other" style="color:var(--danger)">0.00 €</div></div>
            <div class="stat-card"><label style="font-size:0.6em;">ZÁKAZKY</label><div class="stat-value" id="stat_count">0</div></div>
            <div class="stat-card"><label style="font-size:0.6em;">CELKOVÝ OBRAT</label><div class="stat-value" id="stat_obrat">0.00 €</div></div>
            <div class="stat-card card-profit"><label style="font-size:0.6em; color:var(--success)">ČISTÝ ZISK</label><div class="stat-value" id="stat_profit">0.00 €</div></div>
        </div>
        <input type="text" id="search_input" style="border: 2px solid var(--primary); background: #000; padding: 12px; margin-bottom: 15px; font-weight: bold; width: 100%; box-sizing: border-box; color:white; border-radius:8px;" placeholder="🔍 Vyhľadať..." oninput="refreshUI()">
        <div id="list_container"></div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbx-NoHXuzfx7EVN1ZeY2W4nUmj6RS1JKZylLEabzdFueGmgpAiBPWgOZiNxfHxRjaHN/exec";
    const MOJE_HESLO = "9988"; 
    const WATT_USAGE = 0.12; 
    let items = []; 
    let editingId = null;

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('sk-SK');
        const options = { weekday: 'long', day: '2-digit', month: 'long' };
        document.getElementById('live-date').innerText = now.toLocaleDateString('sk-SK', options).toUpperCase();
    }
    setInterval(updateClock, 1000); updateClock();

    const inputs = ['in_w', 'in_count', 'in_h', 'in_m', 'in_price_per', 'cfg_fil', 'cfg_ele'];
    inputs.forEach(id => document.getElementById(id).addEventListener('input', () => updatePreview(true)));

    function updatePreview(autoUpdateCost = true) {
        const w1 = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseInt(document.getElementById('in_count').value) || 1;
        const h1 = parseFloat(document.getElementById('in_h').value) || 0;
        const m1 = parseFloat(document.getElementById('in_m').value) || 0;
        const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;
        const fPrice = parseFloat(document.getElementById('cfg_fil').value) || 0;
        const ePrice = parseFloat(document.getElementById('cfg_ele').value) || 0;

        const totalW = w1 * count;
        const totalMins = (h1 * 60 + m1) * count;
        let totalCost;

        if (autoUpdateCost) {
            totalCost = ((totalW / 1000) * fPrice) + ((totalMins / 60) * WATT_USAGE * ePrice);
            document.getElementById('view_total_cost').value = totalCost.toFixed(2);
        } else {
            totalCost = parseFloat(document.getElementById('view_total_cost').value) || 0;
        }

        const totalProfit = (pricePer * count) - totalCost;
        document.getElementById('view_total_w').innerText = totalW.toFixed(0) + " g";
        document.getElementById('view_total_profit').innerText = totalProfit.toFixed(2) + " €";
        return { totalCost, totalW, totalMins, count, totalProfit, w1, h1, m1, pricePer, sell: pricePer * count };
    }

    function manualCostUpdate() { updatePreview(false); }

    function saveItem() {
        const name = document.getElementById('in_name').value.trim();
        if(!name || !document.getElementById('in_w').value) return alert("Zadaj názov a váhu!");
        const c = updatePreview(false);
        const newItem = { 
            id: editingId || Date.now(), type: 'print', name, sell: c.sell, 
            totalW: c.totalW, mins: c.totalMins, cost: c.totalCost, profit: c.totalProfit, 
            count: c.count, weight: c.w1, h: c.h1, m: c.m1, pPer: c.pricePer, 
            date: new Date().toLocaleString('sk-SK') 
        };
        if(editingId) items = items.map(i => i.id === editingId ? newItem : i); else items.unshift(newItem);
        cancelEdit(); refreshUI();
    }

    function addOtherItem() {
        const name = prompt("Názov:"); if(!name) return;
        const val = parseFloat(prompt("Suma (€):").replace(',', '.')); if(isNaN(val)) return;
        items.unshift({ id: Date.now(), type: 'buy', name, sell: val > 0 ? val : 0, cost: val < 0 ? Math.abs(val) : 0, profit: val, count: 1, date: new Date().toLocaleString('sk-SK') });
        refreshUI();
    }

    function refreshUI() {
        const container = document.getElementById('list_container');
        const query = document.getElementById('search_input').value.toLowerCase();
        container.innerHTML = '';
        
        let tObrat = 0, tProfit = 0, vCount = 0, tKg = 0, tMins = 0, tOtherSpent = 0, tPrintCost = 0;

        items.forEach(i => {
            if(query && !i.name.toLowerCase().includes(query)) return;
            vCount++;
            tObrat += (Number(i.sell) || 0);
            tProfit += (Number(i.profit) || 0);
            if(i.type === 'print') {
                tKg += (Number(i.totalW) || 0);
                tMins += (Number(i.mins) || 0);
                tPrintCost += (Number(i.cost) || 0);
            } else {
                if(i.profit < 0) tOtherSpent += Math.abs(i.profit);
            }

            const div = document.createElement('div');
            div.className = `job-card type-${i.type}`;
            div.innerHTML = `
                <div style="flex:1">
                    <div style="font-weight:bold">${i.name}</div>
                    <div style="font-size:0.7em; color:#666">${i.date}</div>
                </div>
                <div style="text-align:center; font-size:0.8em; min-width:80px;">
                    <div style="color:var(--primary)">${(Number(i.sell)||0).toFixed(2)}€</div>
                    <div style="color:var(--danger)">-${(Number(i.cost)||0).toFixed(2)}€</div>
                </div>
                <div style="font-weight:900; min-width:70px; text-align:right; color:${i.profit>=0?'var(--success)':'var(--danger)'}">
                    ${(Number(i.profit)||0).toFixed(2)}€
                </div>
                <div class="actions">
                    <button class="action-btn" onclick="deleteItem(${i.id})">🗑</button>
                </div>
            `;
            container.appendChild(div);
        });

        document.getElementById('stat_count').innerText = vCount;
        document.getElementById('stat_obrat').innerText = tObrat.toFixed(2) + " €";
        document.getElementById('stat_profit').innerText = tProfit.toFixed(2) + " €";
        document.getElementById('total_kg_ever').innerText = (tKg / 1000).toFixed(2) + " kg";
        document.getElementById('total_time_ever').innerText = Math.floor(tMins/60) + "h " + (tMins%60) + "m";
        document.getElementById('total_spent_other').innerText = tOtherSpent.toFixed(2) + " €";
        document.getElementById('top_total_costs').innerText = tPrintCost.toFixed(2) + " €";
    }

    async function handleCloud(action) {
        if (prompt("Heslo:") !== MOJE_HESLO) return alert("Zlé heslo!");
        try {
            if(action === 'backup') {
                await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(items) });
                alert("Zálohované!");
            } else {
                const res = await fetch(CLOUD_URL);
                items = await res.json(); refreshUI();
                alert("Obnovené!");
            }
        } catch(e) { alert("Chyba cloudu!"); }
    }

    function deleteItem(id) { if(confirm("Zmazať?")) { items = items.filter(i => i.id !== id); refreshUI(); } }
    function cancelEdit() { editingId = null; document.getElementById('btn_cancel').style.display="none"; document.getElementById('in_name').value=""; updatePreview(true); }
</script>
</body>
</html>
