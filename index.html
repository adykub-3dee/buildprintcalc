<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud Edition</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        
        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        
        /* Úprava pre čas a dátum v strede */
        .header-title { display: flex; flex-direction: column; align-items: flex-start; }
        .header-center { flex-grow: 1; text-align: center; }
        #live-clock { font-size: 1.6em; font-weight: 900; letter-spacing: 2px; color: #fff; margin-bottom: 2px; }
        #live-date { font-size: 0.85em; color: var(--primary); text-transform: uppercase; font-weight: bold; }

        .config-bar { background: #001a33; padding: 10px; border-radius: 10px; display: flex; gap: 12px; border: 1px solid var(--primary); justify-content: space-around; }
        .config-input { background: #000; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 3px; width: 60px; }
        
        @media (min-width: 768px) {
            .config-bar { width: auto; }
            .main-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
        }
        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .header-title { align-items: center; margin-bottom: 10px; }
            .header-center { margin-bottom: 10px; }
        }

        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .sticky { position: sticky; top: 15px; }

        label { display: block; font-size: 0.65em; color: #aaa; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .calc-preview { background: #1a1500; padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); font-size: 0.9em; }
        .line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; }
        
        /* Štýl pre editovateľné žlté okno */
        .input-inline { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 4px 8px; border-radius: 4px; width: 80px; text-align: right; font-weight: bold; font-family: inherit; font-size: 1em; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; }
        .btn-add:active { transform: scale(0.98); }
        .btn-edit-active { background: var(--accent); color: #000; }
        .btn-buy { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 8px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: background 0.2s; }

        .cloud-zone { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .btn-cloud { flex: 1; background: #0a1f33; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Mriežka pre štatistiky prispôsobená pre nové položky */
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 900px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .stat-card { background: #111; padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.6em; color: #888; text-transform: uppercase; margin-bottom: 3px; }
        .stat-value { font-size: 1.15em; font-weight: 900; }
        .card-spent { color: var(--danger); border-bottom: 3px solid var(--danger); }
        .card-profit { border: 2px solid var(--success); background: #001a0d; color: var(--success); }

        .search-input { border: 2px solid var(--primary); background: #000; padding: 12px; margin-bottom: 15px; font-weight: bold; width: 100%; box-sizing: border-box; }
        
        .job-card { background: #1a1a1a; padding: 10px 15px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; justify-content: space-between; }
        .job-card.type-buy { border-left: 5px solid var(--danger); background: #1a0a0a; }
        .job-card.type-print { border-left: 5px solid var(--primary); }

        .job-info { flex-grow: 1; min-width: 0; }
        .job-name { font-weight: bold; font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .job-date { font-size: 0.75em; color: #555; }

        .job-data { display: flex; gap: 12px; font-size: 0.85em; font-weight: 600; text-align: center; }
        .data-item { display: flex; flex-direction: column; min-width: 55px; }
        .data-label { font-size: 0.55em; color: #555; text-transform: uppercase; margin-bottom: 2px; }

        .job-profit { min-width: 75px; text-align: right; font-weight: 900; font-size: 1.1em; }
        
        .actions { display: flex; gap: 6px; }
        .action-btn { background: #222; border: 1px solid #444; color: #aaa; cursor: pointer; padding: 6px; border-radius: 4px; font-size: 0.9em; transition: 0.2s; }
        .action-btn:hover { border-color: var(--primary); color: white; }
        
        .empty-history { text-align:center; padding:40px; color:#444; border:2px dashed #222; border-radius:15px; }

        @media (max-width: 850px) {
            .job-card { flex-wrap: wrap; height: auto; }
            .job-data { width: 100%; justify-content: space-between; margin-top: 8px; border-top: 1px solid #222; padding-top: 8px; }
            .actions { width: 100%; justify-content: flex-end; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">
        <h1 style="margin:0; font-size:1.4em; color:var(--primary);">3Dee <span style="color:#fff">PRO</span></h1>
    </div>
    
    <div class="header-center">
        <div id="live-clock">--:--:--</div>
        <div id="live-date">--.--.----</div>
    </div>

    <div class="config-bar">
        <div><label>€/KG</label><input type="number" id="cfg_fil" value="19" class="config-input" step="any"></div>
        <div><label>€/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input" step="any"></div>
    </div>
</div>

<div class="main-layout">
    <div class="side-panels">
        <div class="panel sticky">
            <h2 id="form_title" style="color:var(--primary); font-size: 1.1em; margin-bottom: 15px;">✚ NOVÁ TLAČ</h2>
            <label>Názov Projektu</label>
            <input type="text" id="in_name" placeholder="Názov...">
            <div class="row">
                <div><label>Váha/ks (g)</label><input type="number" id="in_w" step="any"></div>
                <div><label>Počet ks</label><input type="number" id="in_count" value="1" step="1"></div>
            </div>
            <div class="row">
                <div><label>Hodiny</label><input type="number" id="in_h" step="1"></div>
                <div><label>Minúty</label><input type="number" id="in_m" step="1"></div>
            </div>
            <label>Predajná cena / 1 ks (€)</label>
            <input type="number" id="in_price_per" step="any">
            
            <div class="calc-preview">
                <div class="line">
                    <span>MATERIÁL:</span> 
                    <span id="view_total_w">0 g</span>
                </div>
                <div class="line">
                    <span>NÁKLAD SPOLU (€):</span> 
                    <input type="number" id="view_total_cost" class="input-inline" step="any" value="0.00" oninput="manualCostUpdate()">
                </div>
                <div class="line" style="font-size: 1.1em; margin-top: 5px; border-top: 1px solid #444; padding-top: 5px;">
                    <span>ČISTÝ ZISK:</span> 
                    <span id="view_total_profit">0.00 €</span>
                </div>
            </div>
            
            <button class="btn-add" id="btn_save" onclick="saveItem()">ULOŽIŤ DO HISTÓRIE</button>
            <button id="btn_cancel" onclick="cancelEdit()" style="display:none; background:none; border:none; color:#777; width:100%; margin-top:10px; cursor:pointer; font-size:0.8em">Zrušiť úpravu</button>
            <button class="btn-buy" onclick="addOtherItem()">✚ PRIDAŤ INÚ POLOŽKU (NÁKUP/INÉ)</button>
            
            <div class="cloud-zone">
                <button class="btn-cloud" id="btn_backup" onclick="handleCloud('backup')">☁️ Zálohovať</button>
                <button class="btn-cloud" id="btn_restore" onclick="handleCloud('restore')">⬇️ Obnoviť</button>
            </div>
        </div>
    </div>

    <div>
        <div class="summary-grid">
            <div class="stat-card"><div class="stat-label">Vytlačené</div><div class="stat-value" id="total_kg_ever">0.00 kg</div></div>
            <div class="stat-card"><div class="stat-label">Čas Tlače</div><div class="stat-value" id="total_time_ever">0h 0m</div></div>
            
            <div class="stat-card card-spent" style="border-bottom: 3px solid #ffcc00;"><div class="stat-label" style="color:#ffcc00;">Náklad (Mat+Ele)</div><div class="stat-value" id="total_spent_on_prints" style="color:#ffcc00;">0.00 €</div></div>
            
            <div class="stat-card card-spent"><div class="stat-label">Investície / Iné</div><div class="stat-value" id="total_spent_mat">0.00 €</div></div>
            
            <div class="stat-card"><div class="stat-label">Celkový Obrat</div><div class="stat-value" id="stat_obrat">0.00 €</div></div>
            <div class="stat-card card-profit"><div class="stat-label" style="color:var(--success)">Čistý Zisk</div><div class="stat-value" id="stat_profit">0.00 €</div></div>
        </div>
        
        <input type="text" id="search_input" class="search-input" placeholder="🔍 Vyhľadať v histórii..." oninput="refreshUI()">
        <div id="list_container"></div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbx-NoHXuzfx7EVN1ZeY2W4nUmj6RS1JKZylLEabzdFueGmgpAiBPWgOZiNxfHxRjaHN/exec";
    const MOJE_HESLO = "9988"; 
    const WATT_USAGE = 0.12; 
    
    let items = []; 
    let editingId = null;

    // Hodiny v strede hlavičky
    function updateClock() {
        try {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
            const dateStr = now.toLocaleDateString('sk-SK', options);
            
            document.getElementById('live-clock').innerText = timeStr;
            document.getElementById('live-date').innerText = dateStr;
        } catch(e) {}
    }
    setInterval(updateClock, 1000);
    updateClock();

    function checkAuth() {
        let p = prompt("Zadaj heslo pre prístup ku cloudu:");
        return p === MOJE_HESLO;
    }

    // Akcie pre výpočet
    const inputs = ['in_w', 'in_count', 'in_h', 'in_m', 'in_price_per', 'cfg_fil', 'cfg_ele'];
    inputs.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', () => updatePreview(true));
    });

    // Výpočet kalkulačky (true = počíta znova, false = berie to, čo je napísané v okne)
    function updatePreview(autoUpdateCost = true) {
        const w1 = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseInt(document.getElementById('in_count').value) || 1;
        const h1 = parseFloat(document.getElementById('in_h').value) || 0;
        const m1 = parseFloat(document.getElementById('in_m').value) || 0;
        const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;
        const fPrice = parseFloat(document.getElementById('cfg_fil').value) || 0;
        const ePrice = parseFloat(document.getElementById('cfg_ele').value) || 0;

        const totalW = w1 * count;
        const totalMins = (h1 * 60 + m1) * count;
        
        let totalCost;
        if (autoUpdateCost) {
            totalCost = ((totalW / 1000) * fPrice) + ((totalMins / 60) * WATT_USAGE * ePrice);
            document.getElementById('view_total_cost').value = totalCost.toFixed(2);
        } else {
            totalCost = parseFloat(document.getElementById('view_total_cost').value) || 0;
        }

        const totalSell = pricePer * count;
        const totalProfit = totalSell - totalCost;

        document.getElementById('view_total_w').innerText = totalW.toFixed(1) + " g";
        document.getElementById('view_total_profit').innerText = totalProfit.toFixed(2) + " €";
        
        return { totalCost, totalW, totalMins, count, totalSell, totalProfit, w1, h1, m1, pricePer };
    }

    // Volá sa, keď klikneš a meníš žlté okno
    function manualCostUpdate() {
        updatePreview(false);
    }

    function saveItem() {
        const name = document.getElementById('in_name').value.trim();
        if(!name || !document.getElementById('in_w').value) return alert("Doplň názov a váhu!");
        
        // Zoberie údaje s aktuálne nastaveným nákladom
        const c = updatePreview(false);
        const dateStr = editingId ? items.find(i=>i.id===editingId).date : new Date().toLocaleString('sk-SK', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
        
        const newItem = { 
            id: editingId || Date.now(), 
            type: 'print', 
            name: name, 
            sell: Number(c.totalSell), 
            totalW: Number(c.totalW), 
            mins: Number(c.totalMins), 
            cost: Number(c.totalCost), 
            profit: Number(c.totalProfit), 
            count: Number(c.count), 
            weight: Number(c.w1), 
            h: Number(c.h1), 
            m: Number(c.m1), 
            pPer: Number(c.pricePer), 
            date: dateStr 
        };
        
        if(editingId) items = items.map(i => i.id === editingId ? newItem : i); else items.unshift(newItem);
        cancelEdit(); refreshUI();
    }

    function duplicateItem(id) {
        const i = items.find(item => item.id === id);
        const newItem = { ...i, id: Date.now(), date: new Date().toLocaleString('sk-SK', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) };
        items.unshift(newItem);
        refreshUI();
    }

    function editItem(id) {
        const i = items.find(item => item.id === id); if(!i || i.type !== 'print') return;
        editingId = id;
        document.getElementById('in_name').value = i.name; 
        document.getElementById('in_w').value = i.weight;
        document.getElementById('in_count').value = i.count; 
        document.getElementById('in_h').value = i.h;
        document.getElementById('in_m').value = i.m; 
        document.getElementById('in_price_per').value = i.pPer;
        
        // Načíta uložený náklad do žltého okna
        document.getElementById('view_total_cost').value = i.cost.toFixed(2);
        
        document.getElementById('form_title').innerText = "✎ UPRAVIŤ TLAČ";
        document.getElementById('btn_save').innerText = "ULOŽIŤ ZMENY";
        document.getElementById('btn_save').classList.add('btn-edit-active');
        document.getElementById('btn_cancel').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'}); 
        updatePreview(false);
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('in_name').value = ''; 
        document.getElementById('in_w').value = '';
        document.getElementById('in_count').value = '1'; 
        document.getElementById('in_h').value = '';
        document.getElementById('in_m').value = ''; 
        document.getElementById('in_price_per').value = '';
        document.getElementById('view_total_cost').value = '0.00';
        document.getElementById('form_title').innerText = "✚ NOVÁ TLAČ";
        document.getElementById('btn_save').innerText = "ULOŽIŤ DO HISTÓRIE";
        document.getElementById('btn_save').classList.remove('btn-edit-active');
        document.getElementById('btn_cancel').style.display = "none";
        updatePreview(true);
    }

    function addOtherItem() {
        const name = prompt("Názov položky (napr. Nákup PLA, Predaj bazár):"); if(!name) return;
        const valStr = prompt("Suma v € (použi mínus pre náklad, napr. -25):"); if(!valStr) return;
        const val = parseFloat(valStr.replace(',', '.'));
        if(isNaN(val)) return alert("Zadaj platné číslo!");
        
        const isExpense = val < 0;
        items.unshift({ 
            id: Date.now(), 
            type: 'buy', 
            name: name, 
            sell: isExpense ? 0 : val, 
            cost: isExpense ? Math.abs(val) : 0, 
            profit: val, 
            count: 1, 
            date: new Date().toLocaleString('sk-SK', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) 
        });
        refreshUI();
    }

    async function handleCloud(action) {
        if (!checkAuth()) return alert("Nesprávne heslo!");
        const btn = document.getElementById(action === 'backup' ? 'btn_backup' : 'btn_restore');
        const oldTxt = btn.innerText; btn.innerText = "⏳...";
        try {
            if (action === 'backup') {
                await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(items) });
                alert("✅ Zálohované!");
            } else {
                const res = await fetch(CLOUD_URL);
                const data = await res.json();
                items = Array.isArray(data) ? data : [];
                refreshUI();
                alert("✅ Načítané z cloudu!");
            }
        } catch(e) { 
            alert("❌ Chyba pripojenia!"); 
        }
        btn.innerText = oldTxt;
    }

    function deleteItem(id) {
        if(confirm("Vymazať?")) { items = items.filter(i => i.id !== id); refreshUI(); }
    }

    function refreshUI() {
        const container = document.getElementById('list_container');
        const query = (document.getElementById('search_input').value || "").toLowerCase();
        container.innerHTML = '';
        
        if (!items || items.length === 0) {
            container.innerHTML = '<div class="empty-history">Zoznam je prázdny.<br>Klikni na <b>Obnoviť</b> a zadaj heslo pre načítanie cloudu.</div>';
            return;
        }

        let tObrat = 0, tProfit = 0, vCount = 0, tKg = 0, tMins = 0, tSpentBuy = 0, tPrintCost = 0;

        items.forEach(i => {
            if(query && !i.name.toLowerCase().includes(query)) return;

            vCount++;
            tObrat += (Number(i.sell) || 0);
            tProfit += (Number(i.profit) || 0);

            if(i.type === 'print') { 
                tKg += (Number(i.totalW) || 0); 
                tMins += (Number(i.mins) || 0); 
                // Zráta náklady z tlače (Mat+Elec) do novej žltej tabuľky
                tPrintCost += (Number(i.cost) || 0);
            } else { 
                // Zráta mínusové položky z "Iné" do starej červenej tabuľky
                if((Number(i.profit) || 0) < 0) tSpentBuy += Math.abs(Number(i.profit) || 0); 
            }

            const div = document.createElement('div');
            div.className = `job-card type-${i.type}`;
            div.innerHTML = `
                <div class="job-info"><span class="job-name">${i.name}</span><span class="job-date">${i.date}</span></div>
                <div class="job-data">
                    <div class="data-item"><span class="data-label">Množ.</span>${i.count || 1}${i.type==='print'?'ks':''}</div>
                    <div class="data-item"><span class="data-label">Detaily</span>${i.type==='print'? (Number(i.totalW)||0).toFixed(0)+'g | '+Math.floor((Number(i.mins)||0)/60)+'h': 'Iné'}</div>
                    <div class="data-item"><span class="data-label">Predaj</span><span style="color:var(--primary)">${i.sell > 0 ? (Number(i.sell)||0).toFixed(2) + '€' : '-'}</span></div>
                    <div class="data-item"><span class="data-label">Náklad</span><span style="color:var(--danger)">${(Number(i.cost)||0).toFixed(2)}€</span></div>
                </div>
                <div class="job-profit" style="color:${i.profit>=0?'#00ff88':'#ff3e3e'}">${(Number(i.profit)||0).toFixed(2)}€</div>
                <div class="actions">
                    <button class="action-btn" title="Duplikovať" onclick="duplicateItem(${i.id})">❐</button>
                    ${i.type === 'print' ? `<button class="action-btn" title="Upraviť" onclick="editItem(${i.id})">✎</button>` : ''}
                    <button class="action-btn" title="Vymazať" onclick="deleteItem(${i.id})">🗑</button>
                </div>`;
            container.appendChild(div);
        });

        // Aktualizácia tabuliek
        document.getElementById('stat_count').innerText = vCount;
        document.getElementById('stat_obrat').innerText = tObrat.toFixed(2) + " €";
        document.getElementById('stat_profit').innerText = tProfit.toFixed(2) + " €";
        document.getElementById('total_kg_ever').innerText = (tKg / 1000).toFixed(2) + " kg";
        document.getElementById('total_time_ever').innerText = Math.floor(tMins/60) + "h " + (tMins%60) + "m";
        
        // Nová tabuľka na tlačové náklady
        document.getElementById('total_spent_on_prints').innerText = tPrintCost.toFixed(2) + " €";
        
        // Stará tabuľka na iné náklady
        document.getElementById('total_spent_mat').innerText = tSpentBuy.toFixed(2) + " €";
    }
    refreshUI();
</script>
</body>
</html>
